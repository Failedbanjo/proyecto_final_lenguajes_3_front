<div class="login-page">

  <!-- Background -->
  <div class="login-bg">
    <div class="bg-layer-1"></div>
    <div class="bg-layer-2"></div>
    <div class="bg-grid"></div>
  </div>

  <!-- Back to home -->
  <button class="back-btn" (click)="goHome()">
    <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    VOLVER
  </button>

  <!-- Login Card -->
  <div class="login-container">

    <!-- Left panel - branding -->
    <div class="login-brand">
      <div class="brand-content">
        <div class="riot-logo-wrap">
          <svg viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <text x="0" y="32" font-family="'Rajdhani', sans-serif" font-weight="700" font-size="32" fill="white" letter-spacing="5">RIOT</text>
            <text x="90" y="32" font-family="'Rajdhani', sans-serif" font-weight="400" font-size="18" fill="#C89B3C" letter-spacing="2">GAMES</text>
          </svg>
        </div>
        <h2 class="brand-title">UN UNIVERSO.<br><span class="gold">UNA CUENTA.</span></h2>
        <p class="brand-desc">Accede a todos los juegos de Riot con una sola cuenta. League of Legends, VALORANT, TFT y más.</p>

        <div class="brand-games">
          <div class="mini-game" *ngFor="let g of brandGames">
            <div class="mini-game-dot" [style.background]="g.color"></div>
            <span>{{ g.name }}</span>
          </div>
        </div>
      </div>

      <!-- Decorative lines -->
      <div class="deco-lines">
        <div class="deco-line" *ngFor="let l of [1,2,3,4,5]"></div>
      </div>
    </div>

    <!-- Right panel - form -->
    <div class="login-form-panel">
      <div class="form-header">
        <h1 class="form-title">INICIAR SESIÓN</h1>
        <p class="form-subtitle">Bienvenido de vuelta, invocador.</p>
      </div>

      <form class="login-form" (ngSubmit)="onLogin()">

        <!-- Username -->
        <div class="field-group" [class.has-value]="username.length > 0">
          <label class="field-label">USUARIO O CORREO</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input
              type="text"
              class="field-input"
              placeholder="Tu usuario o correo"
              [(ngModel)]="username"
              name="username"
              autocomplete="username"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="field-group" [class.has-value]="password.length > 0">
          <label class="field-label">CONTRASEÑA</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="field-input"
              placeholder="Tu contraseña"
              [(ngModel)]="password"
              name="password"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pass" (click)="togglePassword()">
              <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Options row -->
        <div class="form-options">
          <label class="remember-label">
            <input type="checkbox" class="remember-check" />
            <span class="check-custom"></span>
            <span>Recordarme</span>
          </label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Error message -->
        <div class="error-msg" *ngIf="errorMessage">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          {{ errorMessage }}
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" [class.loading]="isLoading" [disabled]="isLoading">
          <span *ngIf="!isLoading">INICIAR SESIÓN</span>
          <div *ngIf="isLoading" class="loader">
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
          </div>
        </button>

      </form>

      <!-- Divider -->
      <div class="divider">
        <span>O CONTINÚA CON</span>
      </div>

      <!-- Social login -->
      <div class="social-btns">
        <button class="social-btn google">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="social-btn apple">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          Apple
        </button>
      </div>

      <!-- Register link -->
      <p class="register-link">
        ¿No tienes cuenta?
        <a routerLink="/register">CREAR CUENTA</a>
      </p>

    </div>
  </div>

</div>
